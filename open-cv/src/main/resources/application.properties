# Server Configuration
server.port=8080

# Application Name
spring.application.name=smart-portfolio-chat

# Database Configuration (H2 for easy deployment)
spring.datasource.url=jdbc:h2:file:./data/portfolio_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
security.admin.password=admin123
security.jwt.secret=your-secret-key-change-in-production-min-32-chars!!
security.jwt.expiration=86400000

# Chatbot Configuration
chatbot.name=Portfolio Assistant
chatbot.version=1.0
chatbot.max-context-length=10

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.security=INFO
